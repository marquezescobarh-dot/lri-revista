<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículo — LRI</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .articulo-content img { max-width: 100%; border-radius: 8px; margin: 1rem 0; }
    .articulo-content table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
    .articulo-content th { background: var(--azul); color: #fff; padding: 0.6rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; text-align: left; }
    .articulo-content td { padding: 0.6rem 1rem; border-bottom: 1px solid var(--borde); font-size: 0.9rem; }
    .articulo-content blockquote { border-left: 4px solid var(--oro); padding: 0.8rem 1.2rem; background: var(--oro-claro); border-radius: 0 8px 8px 0; margin: 1.5rem 0; font-style: italic; color: var(--texto-2); }
    .archivos-section { background: var(--superficie); border: 1.5px solid var(--borde); border-radius: 12px; padding: 1.5rem; margin: 2rem 0; }
    .archivo-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; background: var(--blanco); border: 1.5px solid var(--borde); border-radius: 8px; margin-bottom: 0.6rem; }
    .archivo-item:last-child { margin-bottom: 0; }
    .archivo-icono { font-size: 1.4rem; }
    .archivo-nombre { font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; flex: 1; }
    .archivo-size { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--texto-3); }
    .org-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--azul-claro); border: 1px solid var(--azul); border-radius: 20px; padding: 0.3rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--azul); margin-bottom: 1rem; }
    .editado-badge { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.5); font-style: italic; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/index.html" class="navbar-brand">
      <span class="brand-siglas">LRI</span>
      <span class="brand-nombre">Facultad de Economía · UNAM</span>
    </a>
    <div class="navbar-links"><a href="/index.html" class="nav-link">← Inicio</a></div>
    <div class="navbar-user" id="nav-user"></div>
  </div>
</nav>

<div id="articulo-container"><div class="spinner" style="margin-top:4rem"></div></div>
<div id="archivos-container" style="display:none">
  <div style="max-width:820px;margin:0 auto;padding:0 2rem">
    <div class="archivos-section">
      <h4 style="font-family:'DM Sans',sans-serif;margin-bottom:1rem;color:var(--azul)">📎 Archivos adicionales</h4>
      <div id="lista-archivos"></div>
      <p id="archivos-login-msg" style="font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--texto-2);display:none">
        <a onclick="abrirModal('login')" style="color:var(--azul);cursor:pointer;font-weight:600">Inicia sesión</a> para descargar los archivos adjuntos.
      </p>
    </div>
  </div>
</div>

<div id="comentarios-container" style="display:none">
  <div class="comentarios-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--borde)">
      <h3 style="font-size:1.3rem">Comentarios</h3>
      <button class="reportar-btn" onclick="abrirReporte()">⚑ Reportar artículo</button>
    </div>
    <div id="comentario-login-msg" style="display:none;background:var(--azul-claro);border:1.5px solid var(--borde);border-radius:10px;padding:1.2rem;margin-bottom:1.5rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--azul)">
      <strong>¿Quieres comentar?</strong>
      <button onclick="abrirModal('login')" style="color:var(--azul);font-weight:700;font-family:'DM Sans',sans-serif;background:none;border:none;cursor:pointer;text-decoration:underline">Inicia sesión</button>
      o <button onclick="abrirModal('registro')" style="color:var(--azul);font-weight:700;font-family:'DM Sans',sans-serif;background:none;border:none;cursor:pointer;text-decoration:underline">regístrate</button>.
    </div>
    <div id="form-comentario" style="display:none;margin-bottom:2rem">
      <textarea class="form-input" id="texto-comentario" placeholder="Escribe tu comentario..." style="min-height:80px;margin-bottom:0.8rem"></textarea>
      <button class="btn btn-secondary btn-sm" onclick="publicarComentario()">Publicar comentario</button>
    </div>
    <div id="lista-comentarios"></div>
    <div id="empty-comentarios" class="empty-state" style="display:none;padding:2rem">
      <p style="font-family:'DM Sans',sans-serif;color:var(--texto-3)">Sé el primero en comentar.</p>
    </div>
  </div>
</div>

<!-- Modal Reportar -->
<div class="modal-overlay" id="modal-reporte">
  <div class="modal">
    <div class="modal-header" style="background:var(--verde)"><h3>Reportar artículo</h3><button class="modal-close" onclick="document.getElementById('modal-reporte').classList.remove('open')">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Tu nombre</label><input type="text" class="form-input" id="rep-nombre"></div>
      <div class="form-group"><label class="form-label">Tu correo</label><input type="email" class="form-input" id="rep-email"></div>
      <div class="form-group"><label class="form-label">Razón</label>
        <select class="form-input" id="rep-razon">
          <option value="contenido_inapropiado">Contenido inapropiado</option>
          <option value="desinformacion">Desinformación</option>
          <option value="plagio">Plagio</option>
          <option value="spam">Spam</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Descripción (opcional)</label><textarea class="form-input" id="rep-desc" style="min-height:80px"></textarea></div>
      <div id="rep-error" class="form-error" style="display:none"></div>
      <button class="btn btn-danger" style="width:100%" onclick="enviarReporte()">Enviar reporte</button>
    </div>
  </div>
</div>

<!-- Modal Auth -->
<div class="modal-overlay" id="modal-auth">
  <div class="modal">
    <div class="modal-header"><h3>Acceder a LRI</h3><button class="modal-close" onclick="cerrarModal()">×</button></div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="login" onclick="cambiarTab('login')">Iniciar sesión</button>
        <button class="modal-tab" data-tab="registro" onclick="cambiarTab('registro')">Registrarse</button>
      </div>
      <div class="modal-form" id="form-login">
        <div class="form-group"><label class="form-label">Correo</label><input type="email" class="form-input" id="login-email"></div>
        <div class="form-group"><label class="form-label">Contraseña</label><input type="password" class="form-input" id="login-pass"></div>
        <div id="login-error" class="form-error" style="display:none"></div>
        <button class="btn btn-secondary" style="width:100%" onclick="hacerLogin()">Iniciar sesión</button>
      </div>
      <div class="modal-form" id="form-registro" style="display:none">
        <div class="form-group"><label class="form-label">Nombre</label><input type="text" class="form-input" id="reg-nombre"></div>
        <div class="form-group"><label class="form-label">Correo</label><input type="email" class="form-input" id="reg-email"></div>
        <div class="form-group"><label class="form-label">Contraseña</label><input type="password" class="form-input" id="reg-pass"></div>
        <div id="reg-error" class="form-error" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="hacerRegistro()">Crear cuenta</button>
      </div>
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:2rem">
  <div class="footer-bottom" style="max-width:1200px;margin:0 auto">
    <span>© 2026 La Riqueza de las Ideas · Facultad de Economía, UNAM</span>
  </div>
</footer>
<div class="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/auth-modal.js"></script>
<script>
  renderNavbar();
  const params = new URLSearchParams(window.location.search);
  const articuloId = params.get('id');
  let articuloData = null;

  const iconosArchivo = { pdf: '📄', docx: '📝', xlsx: '📊', xls: '📊', csv: '📊', imagen: '🖼️' };

  async function cargarArticulo() {
    if (!articuloId) { window.location.href = '/index.html'; return; }
    try {
      const a = articuloData = await apiFetch(`/articulos/${articuloId}`);
      document.title = `${a.titulo} — LRI`;
      const esAutor = estaLogueado() && getUsuario()?.id === a.autor.id;
      const zonaLabel = a.zona === 'academico' ? '📚 Zona Académica' : '🗣️ Libre Expresión';
      const estiloHeader = a.zona === 'libre' ? 'background:var(--verde)' : '';

      document.getElementById('articulo-container').innerHTML = `
        <div class="articulo-header" style="${estiloHeader}">
          <div class="articulo-header-inner">
            ${a.organizacion ? `<div class="org-badge">🏛️ ${a.organizacion.nombre}</div>` : ''}
            <div class="articulo-zona-label">${zonaLabel}</div>
            <h1>${a.titulo}</h1>
            ${a.resumen ? `<p class="resumen">${a.resumen}</p>` : ''}
            <div class="articulo-info">
              <span>Por <strong>${a.autor.nombre}</strong></span>
              ${a.autor.carrera ? `<span>${a.autor.carrera}</span>` : ''}
              ${a.seccion ? `<span>📂 ${a.seccion}</span>` : ''}
              <span>${fechaLegible(a.creado_en)}</span>
              ${a.editado_en ? `<span class="editado-badge">Editado: ${fechaLegible(a.editado_en)}</span>` : ''}
              ${a.tags ? a.tags.split(',').map(t => `<span class="badge" style="background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.85)">${t.trim()}</span>`).join('') : ''}
            </div>
            ${esAutor ? `
              <div style="display:flex;gap:0.7rem;margin-top:1.2rem">
                <a href="/pages/publicar.html?editar=${a.id}" class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4)">✏️ Editar</a>
                <button onclick="eliminarArticulo()" class="btn btn-sm" style="background:rgba(192,57,43,0.8);color:#fff">🗑️ Eliminar</button>
              </div>` : ''}
          </div>
        </div>
        <div class="articulo-content">
          ${a.tipo_contenido === 'editor' ? a.contenido_html : `
            <div style="background:var(--azul-claro);border:1.5px solid var(--borde);border-radius:12px;padding:2rem;text-align:center">
              ${a.tipo_archivo === 'pdf' ? `
                <div style="margin-bottom:0.8rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
                  <span style="font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--texto-2)">Documento PDF del artículo</span>
                  ${estaLogueado() ? `<button onclick="descargarPDF(${a.id}, '${a.titulo}')" class="btn btn-ghost btn-sm">Descargar PDF</button>` : ''}
                </div>
                <iframe src="http://localhost:8000/articulos/${a.id}/ver-pdf" style="width:100%;height:80vh;border:1.5px solid var(--borde);border-radius:12px;display:block" title="${a.titulo}"></iframe>
              ` : `
                <p style="font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--azul);margin-bottom:1rem">Archivo adjunto</p>
                ${estaLogueado()
                  ? `<button onclick="descargarPDF(${a.id}, '${a.titulo}')" class="btn btn-secondary">Descargar archivo</button>`
                  : `<p style="font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--texto-2)"><button onclick="abrirModal('login')" style="color:var(--azul);font-weight:600;background:none;border:none;cursor:pointer;text-decoration:underline">Inicia sesión</button> para descargar el archivo.</p>`}
              `}
            </div>`}
        </div>`;

      // Archivos adicionales
      if (a.archivos && a.archivos.length > 0) {
        document.getElementById('archivos-container').style.display = 'block';
        const lista = document.getElementById('lista-archivos');
        if (estaLogueado()) {
          lista.innerHTML = a.archivos.map(f => `
            <div class="archivo-item">
              <span class="archivo-icono">${iconosArchivo[f.tipo] || '📁'}</span>
              <span class="archivo-nombre">${f.nombre_original}</span>
              ${f.tamanio_kb ? `<span class="archivo-size">${f.tamanio_kb} KB</span>` : ''}
              <a href="http://localhost:8000/articulos/${a.id}/archivos/${f.id}/descargar" class="btn btn-ghost btn-sm" target="_blank">⬇️ Descargar</a>
            </div>`).join('');
        } else {
          document.getElementById('archivos-login-msg').style.display = 'block';
          lista.innerHTML = a.archivos.map(f => `
            <div class="archivo-item" style="opacity:0.6">
              <span class="archivo-icono">${iconosArchivo[f.tipo] || '📁'}</span>
              <span class="archivo-nombre">${f.nombre_original}</span>
              ${f.tamanio_kb ? `<span class="archivo-size">${f.tamanio_kb} KB</span>` : ''}
              <span style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--texto-3)">🔒 Login requerido</span>
            </div>`).join('');
        }
      }

      document.getElementById('comentarios-container').style.display = 'block';
      cargarComentarios();
      mostrarFormComentario();
    } catch(e) {
      document.getElementById('articulo-container').innerHTML = `
        <div class="empty-state" style="padding:5rem 2rem">
          <div class="empty-icon">😕</div><h3>Artículo no encontrado</h3>
          <p>Este artículo no existe o fue eliminado.</p>
          <a href="/index.html" class="btn btn-secondary" style="margin-top:1.5rem">Volver al inicio</a>
        </div>`;
    }
  }


  async function descargarPDF(id, titulo) {
    try {
      const token = getToken();
      const headers = {};
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(API + '/articulos/' + id + '/descargar', { headers });
      if (!res.ok) { toast('Error al descargar', 'error'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = titulo + '.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) { toast('Error al descargar', 'error'); }
  }

  async function eliminarArticulo() {
    if (!confirm('¿Eliminar este artículo? Esta acción no se puede deshacer.')) return;
    try {
      await apiFetch(`/articulos/${articuloId}`, { method: 'DELETE' });
      toast('Artículo eliminado', 'success');
      setTimeout(() => window.location.href = '/index.html', 1500);
    } catch(e) { toast(e.message, 'error'); }
  }

  function mostrarFormComentario() {
    document.getElementById('form-comentario').style.display = estaLogueado() ? 'block' : 'none';
    document.getElementById('comentario-login-msg').style.display = estaLogueado() ? 'none' : 'block';
  }

  let respondiendo_a = null;

  function renderComentario(c, nivel = 0) {
    const indent = nivel > 0 ? 'margin-left:2rem;border-left:2px solid var(--borde);padding-left:1rem' : '';
    return `
      <div class="comentario-item" id="com-${c.id}" style="${indent}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
          <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
            <a href="/pages/perfil.html?id=${c.usuario.id}" style="font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;color:var(--azul);text-decoration:none">${c.usuario.nombre}</a>
            <span style="font-family:'DM Sans',sans-serif;font-size:0.72rem;color:rgba(255,255,255,0.7);background:var(--azul);padding:0.1rem 0.5rem;border-radius:10px">${c.usuario.nivel_titulo}</span>
            ${c.usuario.organizacion ? `<span style="font-size:0.72rem;color:var(--texto-3)">🏛️ ${c.usuario.organizacion.nombre}</span>` : ''}
            <span style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--texto-3)">${fechaRelativa(c.creado_en)}</span>
          </div>
        </div>
        <p style="font-size:0.95rem;color:var(--texto);margin-bottom:0.7rem">${c.contenido}</p>
        <div style="display:flex;align-items:center;gap:1rem">
          <button onclick="likeComentario(${c.id})" id="like-com-${c.id}" style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:${c.yo_di_like ? '#e74c3c' : 'var(--texto-3)'};background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:0.3rem">
            ❤️ <span id="likes-com-${c.id}">${c.likes}</span>
          </button>
          ${estaLogueado() ? `<button onclick="iniciarRespuesta(${c.id}, '${c.usuario.nombre}')" style="font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--azul);background:none;border:none;cursor:pointer">↩ Responder</button>` : ''}
        </div>
        <div id="form-resp-${c.id}" style="display:none;margin-top:0.8rem">
          <textarea id="texto-resp-${c.id}" class="form-input" placeholder="Respondiendo a ${c.usuario.nombre}..." style="min-height:60px;font-size:0.88rem;margin-bottom:0.5rem"></textarea>
          <div style="display:flex;gap:0.5rem">
            <button class="btn btn-secondary btn-sm" onclick="publicarRespuesta(${c.id})">Publicar respuesta</button>
            <button class="btn btn-outline btn-sm" onclick="cancelarRespuesta(${c.id})">Cancelar</button>
          </div>
        </div>
        ${c.respuestas && c.respuestas.length ? c.respuestas.map(r => renderComentario(r, nivel + 1)).join('') : ''}
      </div>`;
  }

  async function cargarComentarios() {
    const lista = document.getElementById('lista-comentarios');
    const empty = document.getElementById('empty-comentarios');
    try {
      const comentarios = await apiFetch(`/articulos/${articuloId}/comentarios`);
      if (!comentarios.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      lista.innerHTML = comentarios.map(c => renderComentario(c)).join('');
    } catch(e) {}
  }

  function iniciarRespuesta(comentarioId, nombre) {
    document.querySelectorAll('[id^="form-resp-"]').forEach(f => f.style.display = 'none');
    document.getElementById('form-resp-' + comentarioId).style.display = 'block';
    document.getElementById('texto-resp-' + comentarioId).focus();
    respondiendo_a = comentarioId;
  }

  function cancelarRespuesta(comentarioId) {
    document.getElementById('form-resp-' + comentarioId).style.display = 'none';
    respondiendo_a = null;
  }

  async function publicarRespuesta(parentId) {
    const texto = document.getElementById('texto-resp-' + parentId).value.trim();
    if (!texto) return;
    try {
      await apiFetch(`/articulos/${articuloId}/comentarios`, {
        method: 'POST',
        body: JSON.stringify({ contenido: texto, parent_id: parentId })
      });
      cancelarRespuesta(parentId);
      toast('Respuesta publicada', 'success');
      cargarComentarios();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function likeComentario(comentarioId) {
    if (!estaLogueado()) { toast('Inicia sesión para dar like', 'info'); return; }
    try {
      const data = await apiFetch(`/articulos/${articuloId}/comentarios/${comentarioId}/like`, { method: 'POST' });
      const btn = document.getElementById('like-com-' + comentarioId);
      const cnt = document.getElementById('likes-com-' + comentarioId);
      if (cnt) cnt.textContent = data.likes;
      if (btn) btn.style.color = data.liked ? '#e74c3c' : 'var(--texto-3)';
    } catch(e) {}
  }

  async function publicarComentario() {
    const texto = document.getElementById('texto-comentario').value.trim();
    if (!texto) { toast('Escribe algo antes de comentar', 'error'); return; }
    try {
      await apiFetch(`/articulos/${articuloId}/comentarios`, { method: 'POST', body: JSON.stringify({ contenido: texto, parent_id: null }) });
      document.getElementById('texto-comentario').value = '';
      document.getElementById('empty-comentarios').style.display = 'none';
      toast('Comentario publicado', 'success');
      cargarComentarios();
    } catch(e) { toast(e.message, 'error'); }
  }

  function abrirReporte() { document.getElementById('modal-reporte').classList.add('open'); }

  async function enviarReporte() {
    const errEl = document.getElementById('rep-error');
    errEl.style.display = 'none';
    const datos = {
      nombre_reportador: document.getElementById('rep-nombre').value,
      email_reportador: document.getElementById('rep-email').value,
      razon: document.getElementById('rep-razon').value,
      descripcion: document.getElementById('rep-desc').value || null
    };
    if (!datos.nombre_reportador || !datos.email_reportador) {
      errEl.textContent = 'Llena todos los campos'; errEl.style.display = 'block'; return;
    }
    try {
      await apiFetch(`/articulos/${articuloId}/reportar`, { method: 'POST', body: JSON.stringify(datos) });
      document.getElementById('modal-reporte').classList.remove('open');
      toast('Reporte enviado. Gracias.', 'success');
    } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
  }

  async function hacerLogin() {
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      const res = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({
        email: document.getElementById('login-email').value,
        contrasena: document.getElementById('login-pass').value, recordarme: false
      })});
      setSession(res.access_token, res.usuario);
      cerrarModal(); toast('¡Bienvenido!', 'success');
      renderNavbar(); mostrarFormComentario();
      cargarArticulo();
    } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
  }

  async function hacerRegistro() {
    const errEl = document.getElementById('reg-error');
    errEl.style.display = 'none';
    try {
      const res = await apiFetch('/auth/registro', { method: 'POST', body: JSON.stringify({
        nombre: document.getElementById('reg-nombre').value,
        email: document.getElementById('reg-email').value,
        contrasena: document.getElementById('reg-pass').value
      })});
      setSession(res.access_token, res.usuario);
      cerrarModal(); toast('¡Cuenta creada!', 'success');
      renderNavbar(); mostrarFormComentario();
      cargarArticulo();
    } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
  }

  cargarArticulo();
</script>
</body>
</html>
